name: Recover Pending AirSat Requests

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: airsat-geotiff-pending-recovery
  cancel-in-progress: false

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: Checkout public processing repository
        uses: actions/checkout@v4

      - name: Checkout private airsat-auto time-series data
        uses: actions/checkout@v4
        with:
          repository: Attarbashian/airsat-auto
          ref: main
          token: ${{ secrets.AIRSAT_AUTO_PAT }}
          fetch-depth: 1
          path: target

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache OpenStreetMap tiles
        uses: actions/cache@v4
        with:
          path: ~/.cache/airsat-osm
          key: airsat-osm-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            airsat-osm-${{ runner.os }}-

      - name: Install Persian Vazir font and dependencies
        run: |
          set -euo pipefail
          sudo mkdir -p /usr/local/share/fonts/airsat
          sudo curl --fail --location --retry 3 \
            "https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/Vazir-Regular.ttf" \
            --output /usr/local/share/fonts/airsat/Vazir-Regular.ttf
          sudo curl --fail --location --retry 3 \
            "https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/Vazir-Bold.ttf" \
            --output /usr/local/share/fonts/airsat/Vazir-Bold.ttf
          sudo fc-cache -f
          python -m pip install --upgrade pip
          python -m pip install earthengine-api requests pillow arabic-reshaper python-bidi

      - name: Recover stale pending requests
        env:
          AIRSAT_AUTO_ROOT: ${{ github.workspace }}/target
          AIRSAT_FONT_DIR: /usr/local/share/fonts/airsat
          AIRSAT_TIMESERIES_FALLBACK: "true"
          AIRSAT_OSM_CACHE_DIR: ~/.cache/airsat-osm
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          AIRSAT_EMAIL_FROM: ${{ secrets.AIRSAT_EMAIL_FROM }}
          AIRSAT_EMAIL_REPLY_TO: ${{ secrets.AIRSAT_EMAIL_REPLY_TO }}
          SMSIR_API_KEY: ${{ secrets.SMSIR_API_KEY }}
          SMSIR_READY_TEMPLATE_ID: ${{ secrets.SMSIR_READY_TEMPLATE_ID }}
          PENDING_MIN_AGE_MINUTES: "2"
          MAX_PENDING_REQUESTS: "5"
          EE_SERVICE_ACCOUNT_JSON: ${{ secrets.EE_SERVICE_ACCOUNT_JSON }}
          EE_PROJECT: ${{ secrets.EE_PROJECT }}
          EE_PROVINCES_ASSET: ${{ secrets.EE_PROVINCES_ASSET }}
          EE_PROVINCE_NAME_FIELD: ${{ secrets.EE_PROVINCE_NAME_FIELD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EXPORT_BUCKET: airsat-exports
        run: python scripts/process_pending_requests.py
